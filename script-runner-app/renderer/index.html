<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脚本运行器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    /* 左侧面板 */
    .left-panel {
      width: 380px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    
    .script-selector {
      margin-bottom: 15px;
    }
    
    .script-selector label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .script-selector select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }
    
    .script-selector select:hover {
      border-color: #999;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-run {
      background: #007aff;
      color: #fff;
    }
    
    .btn-run:hover:not(:disabled) {
      background: #0056b3;
    }
    
    .btn-run:disabled {
      background: #a0c4e8;
      cursor: not-allowed;
    }
    
    .btn-stop {
      background: #ff3b30;
      color: #fff;
    }
    
    .btn-stop:hover:not(:disabled) {
      background: #d32f2f;
    }
    
    .btn-stop:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 15px;
    }
    
    .status-ready {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status-running {
      background: #fff3e0;
      color: #e65100;
    }
    
    .status-success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status-error {
      background: #ffebee;
      color: #c62828;
    }
    
    .output-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    
    .output-section label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .output-box {
      flex: 1;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      padding: 12px;
      border-radius: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    /* 右侧面板 */
    .right-panel {
      flex: 1;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .history-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .btn-refresh {
      padding: 8px 16px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    
    .btn-refresh:hover {
      background: #e8e8e8;
    }
    
    .history-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .history-item {
      padding: 12px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .history-item:hover {
      border-color: #007aff;
      background: #f8f9fa;
    }
    
    .history-time {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .history-stats {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }
    
    .stat-total {
      color: #333;
    }
    
    .stat-success {
      color: #2e7d32;
    }
    
    .stat-error {
      color: #c62828;
    }
    
    .history-empty {
      text-align: center;
      color: #999;
      padding: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧：运行控制 -->
    <div class="left-panel">
      <h2 class="panel-title">运行脚本</h2>
      
      <div class="script-selector">
        <label>选择脚本</label>
        <select id="scriptSelect">
          <option value="">加载中...</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button id="runBtn" class="btn btn-run">运行脚本</button>
        <button id="stopBtn" class="btn btn-stop" disabled>停止</button>
      </div>
      
      <div id="status" class="status status-ready">就绪</div>
      
      <div class="output-section">
        <label>输出</label>
        <div id="output" class="output-box"></div>
      </div>
    </div>
    
    <!-- 右侧：历史记录 -->
    <div class="right-panel">
      <div class="history-header">
        <h2>运行历史</h2>
        <button id="refreshBtn" class="btn-refresh">刷新</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="history-empty">暂无运行记录</div>
      </div>
    </div>
  </div>
  
  <script>
    const { ipcRenderer } = require('electron');
    
    let isRunning = false;
    
    // 获取脚本列表
    async function loadScripts() {
      try {
        const scripts = await ipcRenderer.invoke('get-scripts');
        const select = document.getElementById('scriptSelect');
        select.innerHTML = scripts.map(s => 
          `<option value="${s.file}">${s.file} - ${s.desc}</option>`
        ).join('');
      } catch (e) {
        console.error('加载脚本列表失败:', e);
      }
    }
    
    // 获取历史记录
    async function loadHistory() {
      try {
        const logs = await ipcRenderer.invoke('get-logs');
        const container = document.getElementById('historyList');
        
        if (logs.length === 0) {
          container.innerHTML = '<div class="history-empty">暂无运行记录</div>';
          return;
        }
        
        container.innerHTML = logs.map(log => `
          <div class="history-item" data-file="${log.filename}">
            <div class="history-time">${log.run_time || log.filename}</div>
            <div class="history-stats">
              <span class="stat-total">总数: ${log.total_products || 0}</span>
              <span class="stat-success">成功: ${log.success_count || 0}</span>
              <span class="stat-error">失败: ${log.error_count || 0}</span>
            </div>
          </div>
        `).join('');
        
        // 点击历史项查看详情
        container.querySelectorAll('.history-item').forEach(item => {
          item.addEventListener('click', () => {
            const filename = item.dataset.file;
            showLogDetail(filename);
          });
        });
      } catch (e) {
        console.error('加载历史记录失败:', e);
      }
    }
    
    // 显示日志详情
    async function showLogDetail(filename) {
      try {
        const detail = await ipcRenderer.invoke('get-log-detail', filename);
        if (detail) {
          alert('运行详情:\n' + JSON.stringify(detail, null, 2));
        }
      } catch (e) {
        console.error('获取详情失败:', e);
      }
    }
    
    // 运行脚本
    async function runScript() {
      const scriptFile = document.getElementById('scriptSelect').value;
      if (!scriptFile) return;
      
      isRunning = true;
      updateUI();
      
      const output = document.getElementById('output');
      output.textContent = '';
      
      try {
        await ipcRenderer.invoke('run-script', scriptFile);
      } catch (e) {
        setStatus('error', '运行失败: ' + e.message);
        isRunning = false;
        updateUI();
      }
    }
    
    // 停止脚本
    async function stopScript() {
      try {
        await ipcRenderer.invoke('stop-script');
        setStatus('ready', '已停止');
        isRunning = false;
        updateUI();
      } catch (e) {
        console.error('停止失败:', e);
      }
    }
    
    // 更新UI状态
    function updateUI() {
      const runBtn = document.getElementById('runBtn');
      const stopBtn = document.getElementById('stopBtn');
      
      runBtn.disabled = isRunning;
      stopBtn.disabled = !isRunning;
      
      if (isRunning) {
        setStatus('running', '运行中...');
      }
    }
    
    // 设置状态
    function setStatus(type, message) {
      const status = document.getElementById('status');
      status.className = 'status status-' + type;
      status.textContent = message;
    }
    
    // 监听脚本输出
    ipcRenderer.on('script-output', (event, text) => {
      const output = document.getElementById('output');
      output.textContent += text;
      output.scrollTop = output.scrollHeight;
    });
    
    // 监听脚本结束
    ipcRenderer.on('script-finished', (event, code) => {
      isRunning = false;
      updateUI();
      
      if (code === 0) {
        setStatus('success', '运行完成');
      } else {
        setStatus('error', '运行失败，退出码: ' + code);
      }
      
      loadHistory();
    });
    
    // 绑定事件
    document.getElementById('runBtn').addEventListener('click', runScript);
    document.getElementById('stopBtn').addEventListener('click', stopScript);
    document.getElementById('refreshBtn').addEventListener('click', loadHistory);
    
    // 初始化
    loadScripts();
    loadHistory();
  </script>
</body>
</html>
